<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background-color: #0b0e14; 
            color: white; 
            font-family: sans-serif; 
            padding: 20px; 
            margin: 0;
        }
        h2 { 
            color: #ffffff; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .user-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px; 
            border-bottom: 1px solid #333; 
        }
        .user-info strong { 
            font-size: 1.1em; 
            color: #ffffff; 
        }
        .user-info small { 
            color: #888; 
            font-size: 0.85em; 
        }
        .score { 
            color: #00d4ff; 
            font-weight: bold; 
            font-size: 1.1em; 
        }
    </style>
</head>
<body>
    <h2>National Rankings</h2>
    
    <!-- This loop iterates through the list of users sent by app.py -->
    {% for user in users %}
<div class="user-row">

    <div style="width:40px;
                color:#00d4ff;
                font-weight:bold;
                font-size:18px;">
        #{{ user['position'] }}
    </div>

    <div class="user-info">
        <strong>{{ user['username'] }}</strong><br>
        <small>
            {{ user['board'] }} • {{ user['class_name'] }}
        </small>
    </div>

    <div class="score">
        {{ user['total_score'] }} PTS
    </div>

</div>
{% endfor %}
    
</body>
</html>
