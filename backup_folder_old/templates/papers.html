<!DOCTYPE html>
<html>
<head>
    <title>Papers</title>
</head>

<body>

    <h1>Available Papers</h1>

    {% for p in papers %}

        <div style="border:1px solid black; padding:10px; margin:10px;">

            <h2>{{ p[1] }}</h2>

            <p>Year: {{ p[2] }}</p>

            <p>Type: {{ p[3] }}</p>

            <a href="/take_exam/{{ p[0] }}">
                Start Paper
            </a>

        </div>

    {% endfor %}

</body>
</html>
