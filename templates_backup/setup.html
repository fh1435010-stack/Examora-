<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Examora</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="form-container">

    <img src="{{ url_for('static', filename='logo.png') }}"
         class="small-logo">

    <h1 class="form-title">Academic Setup</h1>

    <form method="POST">

        <select name="board" required>

            <option value="">Select Board</option>

            <option>FBISE</option>
<option>BISE Lahore</option>
<option>BISE Gujranwala</option>
<option>BISE Rawalpindi</option>
<option>BISE Faisalabad</option>
<option>BISE Multan</option>
<option>BISE Sargodha</option>
<option>BISE Bahawalpur</option>
<option>BISE DG Khan</option>
<option>BISE Sahiwal</option>
<option>BISE Peshawar</option>
<option>BISE Abbottabad</option>
<option>BISE Bannu</option>
<option>BISE Mardan</option>
<option>BISE Kohat</option>
<option>BISE Swat</option>
<option>BISE Malakand</option>
<option>BISE Karachi</option>
<option>BISE Hyderabad</option>
<option>BISE Sukkur</option>
<option>BISE Mirpurkhas</option>
<option>BISE Larkana</option>
<option>BISE Quetta</option>
<option>AKU-EB</option>

        </select>

        <select name="class_name" required>

            <option value="">Select Class</option>

            <option>9th</option>
            <option>10th</option>
            <option>1st Year</option>
            <option>2nd Year</option>

        </select>
<select name="group_name" required>

    <option value="">Select Group</option>

    <option>Science Biology</option>
<option>Science Computer</option>
<option>Pre-Medical</option>
<option>Pre-Engineering</option>
<option>ICS Physics</option>
<option>ICS Statistics</option>
<option>ICOM</option>
<option>FA Arts</option>
<option>Humanities</option>
<option>General Science</option>

</select>
        <button type="submit">
            Continue
        </button>

    </form>

</div>

</body>
</html>
